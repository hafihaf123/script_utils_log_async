tag_prefix = "v"

from_latest_tag = false
ignore_merge_commits = false
ignore_fixup_commits = true
disable_changelog = false
disable_bump_commit = false
generate_mono_repository_global_tag = true
generate_mono_repository_package_tags = true
branch_whitelist = []
skip_ci = "[skip ci]"
skip_untracked = false

pre_bump_hooks = ["direnv exec . uv version {{version}}"]
post_bump_hooks = [
    "git push",
    "git push origin v{{version}}",
    "cog changelog --at v{{version}} > .tmp_release_notes.md",
    "gh release create v{{version}} --title v{{version}} --notes-file .tmp_release_notes.md",
    "rm .tmp_release_notes.md",
]
pre_package_bump_hooks = []
post_package_bump_hooks = []

[git_hooks.commit-msg]
script = """#!/bin/sh
set -e
cog verify --file $1
"""

[git_hooks.pre-commit]
script = """
set -e
cog check -l
"""

[commit_types]

[changelog]
path = "CHANGELOG.md"
template = "remote"
remote = "github.com"
repository = "script_utils_log_async"
owner = "hafihaf123"
authors = [{ username = "hafihaf123", signature = "Michal Buchman" }]

[bump_profiles]

[packages]
